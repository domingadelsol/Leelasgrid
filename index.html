<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <title>Leela's Grid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Bauhaus palette: ivory + near-black + accent red ── */
    :root {
      --bg:          #F2F0EB;
      --grid-line:   #E0DDD6;
      --text:        #111110;
      --header-bg:   rgba(242,240,235,0.92);
      --border:      #111110;
      --accent:      #D62828;   /* Bauhaus primary red */
      --focus-ring:  #0057b8;
    }

    body.dark {
      --bg:          #111110;
      --grid-line:   #1e1e1c;
      --text:        #F2F0EB;
      --header-bg:   rgba(17,17,16,0.92);
      --border:      #F2F0EB;
      --accent:      #E84040;
      --focus-ring:  #58a6ff;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; animation: none !important; }
    }

    html, body {
      width: 100%; height: 100%;
      min-width: 300px;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', 'Helvetica Neue', Arial, sans-serif;
      transition: background 0.25s, color 0.25s;
    }

    /* ─── HEADER ─── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0 1.25rem;
      height: auto;
      min-height: 56px;
      background: var(--header-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      /* Bauhaus signature: bold bottom rule */
      border-bottom: 3px solid var(--border);
    }

    /* Vertical left accent bar — Bauhaus constructivist detail */
    header::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 5px;
      background: var(--accent);
    }

    h1 {
      font-size: clamp(0.9rem, 3vw, 1.15rem);
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
      padding-left: 0.5rem; /* clear the accent bar */
      /* Decorative dot in accent color */
      display: flex;
      align-items: center;
      gap: 0.45em;
    }
    h1::before {
      content: '';
      display: inline-block;
      width: 0.55em;
      height: 0.55em;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    /* ─── TOOLBAR ─── */
    .controls {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.5rem 0;
    }

    /* ─── BUTTONS ─── */
    button {
      background: transparent;
      color: var(--text);
      border: 2px solid var(--border);
      min-width: 44px;
      min-height: 44px;
      padding: 0 1.1rem;
      font-family: inherit;
      font-size: clamp(0.62rem, 2.6vw, 0.74rem);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 0;            /* Bauhaus: no rounded corners on buttons */
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
      touch-action: manipulation;
      outline: none;
      position: relative;
    }
    button:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 3px;
    }
    button:hover {
      background: var(--border);
      color: var(--bg);
    }
    button:active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    /* Pressed/active toggle state */
    button[aria-pressed="true"] {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }
    button[aria-pressed="true"]::after {
      content: '';
      position: absolute;
      bottom: -6px; left: 50%;
      transform: translateX(-50%);
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* ─── COLOR SWATCH ─── */
    #color-preview {
      width: 44px;
      height: 44px;
      border-radius: 0;            /* Bauhaus: square swatch */
      border: 2px solid var(--border);
      flex-shrink: 0;
      cursor: pointer;
      transition: transform 0.1s, outline 0.1s;
      outline: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    /* Inner square detail — Bauhaus layered geometry */
    #color-preview::after {
      content: '';
      position: absolute;
      inset: 5px;
      border: 1.5px solid rgba(255,255,255,0.35);
      pointer-events: none;
    }
    #color-preview:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 3px;
    }
    #color-preview:hover  { transform: scale(1.08); }
    #color-preview:active { transform: scale(0.93); }
    #color-preview.flash  { outline: 3px solid var(--accent); outline-offset: 3px; }

    /* ─── SR-ONLY LIVE REGION ─── */
    #sr-live {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    /* ─── CANVAS ─── */
    #grid-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      cursor: crosshair;
      display: block;
      touch-action: none;
      user-select: none;
    }

    @media (max-width: 400px) {
      header { padding: 0 0.75rem; min-height: 52px; }
      h1 { font-size: 0.8rem; letter-spacing: 0.12em; }
      .controls { gap: 0.35rem; }
      button { padding: 0 0.7rem; font-size: 0.6rem; }
    }
  </style>
</head>
<body>

<div id="sr-live" role="status" aria-live="polite" aria-atomic="true"></div>

<canvas
  id="grid-canvas"
  role="application"
  aria-label="Lienzo de dibujo de píxeles. Arrastrá para pintar. Usá el menú de arriba para cambiar color, borrar o limpiar."
  tabindex="0"
></canvas>

<header role="banner">
  <h1>Leela's Grid</h1>

  <div class="controls" role="toolbar" aria-label="Controles de dibujo">
    <div
      id="color-preview"
      role="button"
      tabindex="0"
      aria-label="Color actual: rojo. 1 toque = siguiente color, 2 toques = saltar dos"
    ></div>

    <button id="btn-theme" aria-label="Cambiar a modo oscuro" aria-pressed="false">
      ☾ Dark
    </button>

    <button id="btn-erase" aria-pressed="false" aria-label="Activar borrador">
      ⌫ Löschen
    </button>

    <button id="btn-clear" aria-label="Limpiar todo el lienzo">
      Neu
    </button>
  </div>
</header>

<script>
  const CELL = 8;

  const PALETTE = [
    { hex: '#e63946', name: 'rojo'         },
    { hex: '#f4631e', name: 'naranja-rojo' },
    { hex: '#f4a819', name: 'naranja'      },
    { hex: '#f7d117', name: 'amarillo'     },
    { hex: '#5ec42a', name: 'verde-lima'   },
    { hex: '#26a96c', name: 'verde'        },
    { hex: '#17c3b2', name: 'teal'         },
    { hex: '#1a8fe3', name: 'azul cielo'   },
    { hex: '#3d5af1', name: 'azul'         },
    { hex: '#9b5de5', name: 'violeta'      },
    { hex: '#111111', name: 'negro'        },
    { hex: '#ffffff', name: 'blanco'       },
  ];

  let isDark     = false;
  let colorIndex = 0;
  let isPainting = false;
  let lastCell   = null;
  let altHeld    = false;
  let isErasing  = false;

  const painted = new Map();

  const canvas       = document.getElementById('grid-canvas');
  const ctx          = canvas.getContext('2d');
  const btnTheme     = document.getElementById('btn-theme');
  const btnClear     = document.getElementById('btn-clear');
  const btnErase     = document.getElementById('btn-erase');
  const colorPreview = document.getElementById('color-preview');
  const srLive       = document.getElementById('sr-live');

  function announce(msg) {
    srLive.textContent = '';
    requestAnimationFrame(() => { srLive.textContent = msg; });
  }

  const bgColor   = () => isDark ? '#111110' : '#F2F0EB';
  const lineColor = () => isDark ? '#1e1e1c' : '#E0DDD6';
  const curHex    = () => PALETTE[colorIndex].hex;
  const curName   = () => PALETTE[colorIndex].name;
  const key       = (col, row) => col + ',' + row;

  function updatePreview() {
    const hex = curHex();
    colorPreview.style.background = hex;
    colorPreview.style.borderColor =
      hex === '#ffffff' ? '#aaa' :
      hex === '#111111' ? '#555' : '';
    colorPreview.setAttribute(
      'aria-label',
      `Color actual: ${curName()}. 1 toque = siguiente, 2 toques = saltar dos`
    );
  }

  function advanceColor(steps) {
    colorIndex = (colorIndex + steps) % PALETTE.length;
    updatePreview();
    colorPreview.classList.add('flash');
    setTimeout(() => colorPreview.classList.remove('flash'), 200);
    announce(`Color: ${curName()}`);
  }

  let swatchClickTimer = null;
  function handleSwatchActivation() {
    if (swatchClickTimer) {
      clearTimeout(swatchClickTimer);
      swatchClickTimer = null;
      advanceColor(2);
    } else {
      swatchClickTimer = setTimeout(() => { swatchClickTimer = null; advanceColor(1); }, 350);
    }
  }

  colorPreview.addEventListener('click', e => { e.stopPropagation(); handleSwatchActivation(); });
  colorPreview.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleSwatchActivation(); }
    if (e.key === 'ArrowRight') { e.preventDefault(); btnTheme.focus(); }
  });

  let swatchTouchMoved = false;
  colorPreview.addEventListener('touchstart', e => { swatchTouchMoved = false; e.stopPropagation(); }, { passive: true });
  colorPreview.addEventListener('touchmove',  () => { swatchTouchMoved = true; }, { passive: true });
  colorPreview.addEventListener('touchend',   e => {
    e.stopPropagation();
    if (!swatchTouchMoved) handleSwatchActivation();
    e.preventDefault();
  });

  const toolbarItems = [colorPreview, btnTheme, btnErase, btnClear];
  toolbarItems.forEach((el, i) => {
    el.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') { e.preventDefault(); toolbarItems[(i + 1) % toolbarItems.length].focus(); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); toolbarItems[(i - 1 + toolbarItems.length) % toolbarItems.length].focus(); }
    });
  });

  let COLS, ROWS;

  function drawAll() {
    ctx.fillStyle = bgColor();
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    for (const [k, ci] of painted) {
      const [col, row] = k.split(',').map(Number);
      if (col >= COLS || row >= ROWS) continue;
      ctx.fillStyle = PALETTE[ci].hex;
      ctx.fillRect(col * CELL, row * CELL, CELL, CELL);
    }
    ctx.strokeStyle = lineColor();
    ctx.lineWidth = 0.3;
    ctx.beginPath();
    for (let x = 0; x <= COLS * CELL; x += CELL) { ctx.moveTo(x, 0); ctx.lineTo(x, ROWS * CELL); }
    for (let y = 0; y <= ROWS * CELL; y += CELL) { ctx.moveTo(0, y); ctx.lineTo(COLS * CELL, y); }
    ctx.stroke();
  }

  function drawCell(col, row) {
    const x = col * CELL, y = row * CELL;
    const k = key(col, row);
    ctx.fillStyle = painted.has(k) ? PALETTE[painted.get(k)].hex : bgColor();
    ctx.fillRect(x, y, CELL, CELL);
    ctx.strokeStyle = lineColor();
    ctx.lineWidth = 0.3;
    ctx.strokeRect(x + 0.25, y + 0.25, CELL - 0.5, CELL - 0.5);
  }

  function cellAt(cx, cy) {
    const col = Math.floor(cx / CELL);
    const row = Math.floor(cy / CELL);
    if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return null;
    return { col, row };
  }

  function paintAt(cx, cy) {
    const cell = cellAt(cx, cy);
    if (!cell) return;
    const { col, row } = cell;
    const k = key(col, row);
    if (altHeld) {
      for (let dr = 0; dr < 2; dr++) for (let dc = 0; dc < 2; dc++) {
        const c = col + dc, r = row + dr;
        if (c >= COLS || r >= ROWS) continue;
        const ki = key(c, r);
        if (isErasing) painted.delete(ki); else painted.set(ki, colorIndex);
        drawCell(c, r);
      }
      lastCell = k;
    } else {
      if (k === lastCell) return;
      lastCell = k;
      if (isErasing) painted.delete(k); else painted.set(k, colorIndex);
      drawCell(col, row);
    }
  }

  let focusCol = 0, focusRow = 0;
  canvas.addEventListener('keydown', e => {
    const step = altHeld ? 2 : 1;
    if      (e.key === 'ArrowRight') { e.preventDefault(); focusCol = Math.min(focusCol + step, COLS - 1); }
    else if (e.key === 'ArrowLeft')  { e.preventDefault(); focusCol = Math.max(focusCol - step, 0); }
    else if (e.key === 'ArrowDown')  { e.preventDefault(); focusRow = Math.min(focusRow + step, ROWS - 1); }
    else if (e.key === 'ArrowUp')    { e.preventDefault(); focusRow = Math.max(focusRow - step, 0); }
    else if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      const k = key(focusCol, focusRow);
      if (isErasing) painted.delete(k); else painted.set(k, colorIndex);
      drawCell(focusCol, focusRow);
      announce(`Celda ${focusCol},${focusRow} ${isErasing ? 'borrada' : 'pintada de ' + curName()}`);
    }
    else if (e.key === 'Escape') { canvas.blur(); }
  });

  window.addEventListener('keydown', e => {
    if (e.code === 'AltLeft' || e.code === 'AltRight') { e.preventDefault(); altHeld = true; canvas.style.cursor = 'cell'; }
  });
  window.addEventListener('keyup', e => {
    if (e.code === 'AltLeft' || e.code === 'AltRight') { altHeld = false; canvas.style.cursor = isErasing ? 'cell' : 'crosshair'; }
  });

  canvas.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    isPainting = true; lastCell = null;
    paintAt(e.clientX, e.clientY); e.preventDefault();
  });
  window.addEventListener('mouseup', () => { isPainting = false; lastCell = null; });
  canvas.addEventListener('mousemove', e => { if (!isPainting) return; paintAt(e.clientX, e.clientY); });

  canvas.addEventListener('touchstart', e => {
    isPainting = true; lastCell = null;
    paintAt(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    if (!isPainting) return;
    paintAt(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchend', () => { isPainting = false; lastCell = null; });

  btnTheme.addEventListener('click', () => {
    isDark = !isDark;
    document.body.classList.toggle('dark', isDark);
    btnTheme.setAttribute('aria-label', isDark ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro');
    btnTheme.setAttribute('aria-pressed', isDark);
    btnTheme.textContent = isDark ? '☀ Light' : '☾ Dark';
    drawAll();
    announce(isDark ? 'Modo oscuro activado' : 'Modo claro activado');
  });

  btnErase.addEventListener('click', () => {
    isErasing = !isErasing;
    btnErase.setAttribute('aria-pressed', isErasing);
    btnErase.setAttribute('aria-label', isErasing ? 'Desactivar borrador' : 'Activar borrador');
    canvas.style.cursor = isErasing ? 'cell' : 'crosshair';
    announce(isErasing ? 'Borrador activado' : 'Borrador desactivado');
  });

  btnClear.addEventListener('click', () => { painted.clear(); drawAll(); announce('Lienzo limpiado'); });

  let resizeTimer = null;
  function onResize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    COLS = Math.floor(canvas.width  / CELL);
    ROWS = Math.floor(canvas.height / CELL);
    drawAll();
  }
  window.addEventListener('resize', () => { clearTimeout(resizeTimer); onResize(); resizeTimer = setTimeout(onResize, 150); });

  updatePreview();
  onResize();
</script>
</body>
</html>
